name: rodar-bot

# Agendamento do bot. GitHub roda o cron em UTC e pode ATRASAR ou pular
# execuções sob carga (é best-effort, não tempo-real) — como cada rota do
# api-vagas devolve só a vaga mais recente e o dedup é persistido, um atraso
# ocasional só adia a vaga pro próximo ciclo, sem perder nada.
on:
  schedule:
    - cron: "0 */2 * * *"   # a cada 2h, no minuto 0 (UTC)
  workflow_dispatch: {}      # permite disparar manualmente pelo painel do GitHub

# Necessário pra o job commitar o vagas.db (dedup) de volta no repo.
permissions:
  contents: write

# Evita dois ciclos rodando ao mesmo tempo (ex: cron + disparo manual).
concurrency:
  group: rodar-bot
  cancel-in-progress: false

jobs:
  ciclo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar um ciclo do bot
        env:
          # --- SECRETS (cadastrar no painel: Settings > Secrets and variables > Actions) ---
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOBS_API_BASE_URL: ${{ secrets.JOBS_API_BASE_URL }}
          # --- Config não-sensível (pode ajustar aqui sem mexer no código) ---
          SEARCH_KEYWORD: "estagio desenvolvimento"
          MAX_VAGAS_POR_CICLO: "8"
          RESERVA_VAGAS_BR: "3"
          TIMEZONE: "America/Sao_Paulo"
        run: python main.py

      - name: Persistir vagas.db (dedup) só se mudou
        # O ambiente do Actions é descartado a cada run, então o banco não
        # sobrevive sozinho. Commitamos de volta APENAS quando o arquivo muda
        # (ou seja, quando alguma vaga nova foi enviada) — em ciclos sem novidade
        # nada é commitado, mantendo o histórico limpo. O [skip ci] evita que
        # esse commit dispare o workflow de novo.
        run: |
          git add vagas.db
          if git diff --cached --quiet; then
            echo "vagas.db inalterado — nada a commitar."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: atualiza vagas.db (dedup) [skip ci]"
            git pull --rebase --autostash origin "${{ github.ref_name }}"
            git push
          fi
